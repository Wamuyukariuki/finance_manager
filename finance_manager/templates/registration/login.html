<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager - Sign In</title>
    <link rel="stylesheet" href="{% static 'css/login_styles.css' %}">
</head>
<body>
    <div class="login-container">
        <h1>Welcome to Finance Manager</h1>
        <p>Enter your Username and password to log in or create an account.</p>
        <form method="post" class="login-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-button">Sign In</button>
        </form>
        <p class="signup-prompt">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
    </div>
</body>
</html>
