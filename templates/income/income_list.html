{% extends 'base.html' %}

{% block title %}Income List{% endblock %}

{% block content %}
<div class="card-container">
    {% for income in incomes %}
    <div class="card">
        <h2>{{ income.category }}</h2>
        <p><strong>Amount:</strong> ${{ income.amount }}</p>
        <p><strong>Date:</strong> {{ income.date }}</p>
        <p>{{ income.description }}</p>
        <a href="{% url 'edit_income' income.pk %}" class="btn">Edit</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
